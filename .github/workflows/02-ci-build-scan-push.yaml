name: "Stage 2 - CI (Maven + Sonar + Docker + Trivy + ECR)"

on:
  push:
    branches: ["feature"]
  pull_request:
    branches: ["feature"]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  build-test-scan-push:
    runs-on: ${{ fromJSON(vars.RUNS_ON || '"ubuntu-latest"') }}
    defaults:
      run:
        shell: bash

    env:
      APP_DIR: board
      ECR_REPOSITORY: ""
      AWS_REGION: ""
      PUSH_TO_ECR: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve config
        run: |
          AWS_REGION="${{ vars.AWS_REGION != '' && vars.AWS_REGION || secrets.AWS_REGION }}"
          ECR_REPOSITORY="${{ vars.ECR_REPOSITORY != '' && vars.ECR_REPOSITORY || secrets.ECR_REPOSITORY }}"
          SONAR_HOST_URL="${{ secrets.SONAR_HOST_URL != '' && secrets.SONAR_HOST_URL || secrets.SONAR_HOST_URI }}"

          echo "AWS_REGION=${AWS_REGION}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> "$GITHUB_ENV"
          echo "SONAR_HOST_URL=${SONAR_HOST_URL}" >> "$GITHUB_ENV"

      - name: Preflight (docker)
        run: docker version

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: maven

      - name: Build and test (Maven wrapper)
        working-directory: ${{ env.APP_DIR }}
        run: ./mvnw -B clean verify

      - name: SonarQube scan
        if: ${{ secrets.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          projectBaseDir: ${{ env.APP_DIR }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.PUSH_TO_ECR == 'true' && secrets.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (Access keys)
        if: ${{ env.PUSH_TO_ECR == 'true' && secrets.AWS_ROLE_TO_ASSUME == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: ${{ env.PUSH_TO_ECR == 'true' }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: image
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          if [[ "${PUSH_TO_ECR}" == "true" ]]; then
            if [[ -z "${ECR_REPOSITORY}" ]]; then
              echo "ECR_REPOSITORY is empty. Set it as a repo Variable ECR_REPOSITORY or repo Secret ECR_REPOSITORY."
              exit 1
            fi
            if [[ -z "${AWS_REGION}" ]]; then
              echo "AWS_REGION is empty. Set it as a repo Variable AWS_REGION or repo Secret AWS_REGION."
              exit 1
            fi
            IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          else
            IMAGE_URI="boardgame:${IMAGE_TAG}"
          fi
          docker build -f "${APP_DIR}/Dockerfile" -t "${IMAGE_URI}" "${APP_DIR}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.image.outputs.image_uri }}
          format: table
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Push to ECR
        if: ${{ env.PUSH_TO_ECR == 'true' }}
        run: docker push "${{ steps.image.outputs.image_uri }}"

      - name: Tag and push latest
        if: ${{ env.PUSH_TO_ECR == 'true' && github.ref == 'refs/heads/main' }}
        run: |
          IMAGE_LATEST="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:latest"
          docker tag "${{ steps.image.outputs.image_uri }}" "${IMAGE_LATEST}"
          docker push "${IMAGE_LATEST}"

      - name: Export image uri (artifact)
        run: echo "${{ steps.image.outputs.image_uri }}" > image-uri.txt

      - name: Upload image uri artifact
        if: ${{ env.PUSH_TO_ECR == 'true' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: image-uri
          path: image-uri.txt
          if-no-files-found: error
