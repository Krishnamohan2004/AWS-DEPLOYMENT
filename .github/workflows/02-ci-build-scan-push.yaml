name: "Stage 2 - CI (Maven + Sonar + Docker + Trivy + ECR)"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    env:
      APP_DIR: board
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      PUSH_TO_ECR: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: maven

      - name: Build and test (Maven wrapper)
        working-directory: ${{ env.APP_DIR }}
        run: ./mvnw -B clean verify

      - name: SonarQube scan
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          projectBaseDir: ${{ env.APP_DIR }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.PUSH_TO_ECR == 'true' && secrets.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (Access keys)
        if: ${{ env.PUSH_TO_ECR == 'true' && secrets.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account id
        if: ${{ env.PUSH_TO_ECR == 'true' }}
        id: aws-account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        if: ${{ env.PUSH_TO_ECR == 'true' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: image
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          if [[ "${PUSH_TO_ECR}" == "true" ]]; then
            if [[ -z "${ECR_REPOSITORY}" ]]; then
              echo "vars.ECR_REPOSITORY is empty. Set repository name via GitHub Actions variable ECR_REPOSITORY."
              exit 1
            fi
            if [[ -z "${AWS_REGION}" ]]; then
              echo "vars.AWS_REGION is empty. Set AWS region via GitHub Actions variable AWS_REGION."
              exit 1
            fi
            IMAGE_URI="${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"
          else
            IMAGE_URI="boardgame:${IMAGE_TAG}"
          fi
          docker build -f "${APP_DIR}/Dockerfile" -t "${IMAGE_URI}" "${APP_DIR}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.image.outputs.image_uri }}
          format: table
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Push to ECR
        if: ${{ env.PUSH_TO_ECR == 'true' }}
        run: docker push "${{ steps.image.outputs.image_uri }}"

      - name: Tag and push latest
        if: ${{ env.PUSH_TO_ECR == 'true' && github.ref == 'refs/heads/main' }}
        run: |
          IMAGE_LATEST="${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest"
          docker tag "${{ steps.image.outputs.image_uri }}" "${IMAGE_LATEST}"
          docker push "${IMAGE_LATEST}"

      - name: Export image uri (artifact)
        run: echo "${{ steps.image.outputs.image_uri }}" > image-uri.txt

      - name: Upload image uri artifact
        if: ${{ env.PUSH_TO_ECR == 'true' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: image-uri
          path: image-uri.txt
          if-no-files-found: error
